<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Xenon Monaco Editor</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <main id="app" aria-label="Monaco Lua Editor">
    <header id="tab-strip" aria-label="Editor tabs">
      <div id="tabs" role="tablist" aria-label="Open files"></div>
      <button id="add-tab-btn" type="button" aria-label="New tab" title="New tab"></button>
    </header>

    <section id="editor-shell" aria-label="Editor">
      <div id="editor-root"></div>
    </section>

    <div id="status" role="status" aria-live="polite"></div>
  </main>

  <!-- Monaco AMD loader from local files (offline). -->
  <script src="./min/vs/loader.js"></script>
  <script src="./assets/editor.js"></script>
</body>
</html>
